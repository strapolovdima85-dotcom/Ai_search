version: '3.8'

services:
  # Векторная база данных Qdrant
  qdrant:
    image: qdrant/qdrant:v1.9.1
    container_name: ai_vector_db
    ports:
      - "6333:6333"       # Порт для REST API (через него общается Python)
      - "6334:6334"       # Порт для gRPC (высокоскоростной обмен)
    volumes:
      - qdrant_data:/qdrant/storage # Сохранение данных векторов при перезапуске
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  # Наш ИИ-микросервис на Python
  ai-search-service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    container_name: ai_search_service
    ports:
      - "8000:8000"       # Порт, на который 1С:ERP будет слать поисковые запросы
    volumes:
      - ./ai_service/app:/app/app       # Монтирование кода для удобной разработки без пересборки
      - hf_models_cache:/app/models     # Кэширование весов нейросети на диске хоста
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      # Использование более легкой и быстрой модели, дружественной к памяти
      - EMBEDDING_MODEL_NAME=intfloat/multilingual-e5-small
      - HF_HOME=/app/models
      - PYTHONUNBUFFERED=1
    depends_on:
      - qdrant
    restart: always
    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 2G

volumes:
  qdrant_data:
  hf_models_cache:
